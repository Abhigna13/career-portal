{% extends 'base.html' %}
{% block content %}

<div class="center-box">

    <div class="card">

        <h1>🔐 Welcome Back</h1>

        <p style="color:#cbd5e1;">
            Login to continue your AI-powered career journey and explore personalized job recommendations
        </p>

        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>

                <input 
                    type="text"
                    name="username"
                    class="form-control"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>

                <input 
                    type="password"
                    name="password"
                    class="form-control"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <p style="margin-top:15px; color:#cbd5e1; font-size:13px;">
            Don’t have an account?
            <a href="{% url 'register' %}" style="color:#38bdf8;">
                Register here
            </a>
        </p>

    </div>

</div>

{% endblock %}

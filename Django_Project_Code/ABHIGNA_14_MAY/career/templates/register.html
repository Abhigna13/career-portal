{% extends 'base.html' %}
{% block content %}

<div class="center-box">

    <div class="card register-card">

        <h1>🚀 Create Account</h1>

        <p class="subtitle">
            Join your AI-powered career journey
        </p>

        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>

                <input 
                    type="text"
                    name="full_name"
                    class="form-control"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="words"
                    spellcheck="false"
                    required
                >
            </div>

            <div class="form-group">
                <label>Username</label>

                <input 
                    type="text"
                    name="username"
                    class="form-control"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    required
                >
            </div>

            <div class="form-group">
                <label>Email</label>

                <input 
                    type="email"
                    name="email"
                    class="form-control"
                    autocomplete="off"
                    spellcheck="false"
                    required
                >
            </div>

            <div class="form-group">
                <label>Password</label>

                <input 
                    type="password"
                    name="password1"
                    class="form-control"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="form-group">
                <label>Confirm Password</label>

                <input 
                    type="password"
                    name="password2"
                    class="form-control"
                    autocomplete="new-password"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Create Account
            </button>

        </form>

        <p class="bottom-text">
            Already have an account?
            <a href="{% url 'login' %}" style="color:#38bdf8;">
                Login here
            </a>
        </p>

    </div>

</div>

<style>

/* same width */
.register-card{
    max-width:560px !important;
    width:100%;
    padding:18px 30px !important;
}

/* title */
.register-card h1{
    font-size:28px;
    margin-bottom:2px;
}

/* subtitle */
.register-card .subtitle{
    margin-bottom:10px !important;
    font-size:13px;
    color:#cbd5e1;
}

/* compact form spacing */
.register-card .form-group{
    margin-bottom:8px;
}

/* labels */
.register-card label{
    font-size:12px;
    margin-bottom:2px;
    display:block;
}

/* inputs */
.register-card .form-control{
    height:38px;
    padding:8px 12px;
    border-radius:10px;
    transition:0.25s ease;
}

/* focus effect */
.register-card .form-control:focus{
    transform:scale(1.01);
}

/* button */
.register-card .btn{
    height:40px;
    padding:8px;
    margin-top:4px;
    transition:0.3s ease;
}

/* footer */
.register-card .bottom-text{
    margin-top:8px !important;
    font-size:12px;
    color:#cbd5e1;
}

</style>

{% endblock %}
